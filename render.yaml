databases:
  - name: placetrack-db
    plan: free
    databaseName: placetrack

services:
  - type: web
    name: placetrack-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: placetrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
      # Base URL of the deployed React app (no trailing slash). Required for password-reset email links.
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: "3.12.0"
